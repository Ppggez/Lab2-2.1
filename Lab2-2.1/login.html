<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Login / Sign In</title>
  <style>
    section { display: none; }
    section:target { display: block; }
    #loginSection:target ~ #signinSection,
    #signinSection:target ~ #loginSection { display: none; }
    #loginSection { display: block; }
    #loginSection:target { display: block; }
  </style>
</head>
<body>


  <section id="loginSection">
    <header>
      <p>page header</p>
      <img src="https://placekitten.com/80/80" alt="logo" width="80">
    </header>

    <hr>

    <main>
      <p>page body</p>
      <h1>หน้า Login</h1>

      <form action="/sendLogin" method="post">
        <label for="loginUsername">username</label>
        <input type="email" id="loginUsername" name="username" placeholder="Email">

        <label for="loginPassword">password</label>
        <input type="password" id="loginPassword" name="password" placeholder="Password">

        <button type="submit">Login</button>
        <button type="reset">Reset</button>
        <a href="#signinSection">Sign In</a>
      </form>
    </main>

    <hr>

    <footer>
      <p>page footer</p>
      <address>ที่อยู่ camt มช</address>
      <iframe
        src="https://www.google.com/maps?q=College+of+Arts,+Media+and+Technology+CMU&output=embed"
        width="400" height="300" style="border:0;" loading="lazy">
      </iframe>
    </footer>
  </section>

 




  <section id="signinSection">
    <header>
      <p>page header</p>
      <img src="https://placekitten.com/80/80" alt="logo" width="80">
    </header>

    <hr>

    <main>
      <p>page body</p>
      <h1>หน้า Sign In</h1>

      <form action="/sendSignIn" method="post">
        <label for="signinUsername">username</label>
        <input type="email" id="signinUsername" name="username" placeholder="Email">

        <label for="signinPassword">password</label>
        <input type="password" id="signinPassword" name="password" placeholder="Password">

        <label for="fname">ชื่อ</label>
        <input type="text" id="fname" name="fname">

        <label for="lname">นามสกุล</label>
        <input type="text" id="lname" name="lname">

        <button type="submit">Submit</button>
        <a href="#loginSection">กลับไปหน้า login</a>
      </form>
    </main>

    <hr>

    <footer>
      <p>page footer</p>
      <address>ที่อยู่ camt มช</address>
      <iframe
        src="https://www.google.com/maps?q=College+of+Arts,+Media+and+Technology+CMU&output=embed"
        width="400" height="300" style="border:0;" loading="lazy">
      </iframe>
    </footer>
  </section>

</body>
</html>
