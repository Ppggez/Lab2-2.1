<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>หน้า Login</title>

</head>
<body class="bg-white">

  <div class="container">
    <div class="col-12 col-md-6 col-lg-4 mx-auto text-center mt-4">

      
      <img src="https://www.cmu.ac.th/content/Article/2023/7e6d8808-54b5-419d-b3da-99de6cce26f4/047c25cb-dee0-494e-b462-4f28f9e51ffd.jpg" alt="โลโก้ 60 ปี มช." class="mb-2" style="width:120px;">

      </p>

    
      <div class="btn-group mb-4">
        <button class="btn btn-secondary">Home</button>
        <button class="btn btn-danger">Login</button>
      </div>

   
      <h2 class="mb-4">หน้า Login</h2>

     
      <form class="text-start">
        <div class="mb-3 text-center">
          <label class="form-label fw-bold">username</label>
          <input type="email" class="form-control" placeholder="Email">
        </div>

        <div class="mb-3 text-center">
          <label class="form-label fw-bold">password</label>
          <input type="password" class="form-control" placeholder="Password">
        </div>

        <div class="d-flex justify-content-center align-items-center gap-4 mb-4">
          <button type="submit" class="btn btn-primary px-4">Login</button>
          <a href="#" class="text-decoration-underline">Sign In</a>
        </div>
      </form>

      <p class="mb-1">page footer</p>
      <p class="mb-3">ที่อยู่ camt มช</p>
